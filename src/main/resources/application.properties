spring.application.name=sgci-backend
server.port=${SERVER_PORT:8080}

# SQL Server Express
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:sgci_db};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME:sgci_user}
spring.datasource.password=${DB_PASSWORD:sgci_clave}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=dbo
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JWT
app.jwt.secret=${JWT_SECRET:sgci-local-development-secret-key-change-me}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
